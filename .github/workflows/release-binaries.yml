name: Release Binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: lux-amd64
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: actions/create-release@v1
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: lux-amd64
          - os: linux
            arch: arm64
            runner: lux-arm64
          - os: darwin
            arch: amd64
            runner: macos-13
          - os: darwin
            arch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o lux main.go
          tar -czf lux-${{ matrix.os }}-${{ matrix.arch }}.tar.gz lux
      - name: Upload
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: lux-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          asset_name: lux-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          asset_content_type: application/gzip
